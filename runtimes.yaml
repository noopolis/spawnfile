# Runtime registry
#
# Each entry pins the stable version of a runtime that the Spawnfile
# compiler currently targets or is researching.
#
# Fields:
#   remote          Git clone URL
#   ref             Pinned git ref — should be the latest stable tag
#   default_branch  The repo's main branch (for fetch)
#   install         Pinned install strategy for the verified runtime version
#   status          active (has adapter) | exploratory (research only)
#
# Run ./scripts/runtimes.sh to clone or update all entries to their
# pinned refs.

runtimes:
  daimon:
    remote: git@github.com:noopolis/daimon.git
    ref: v0.1.0
    default_branch: main
    install:
      kind: npm
      package: "@noopolis/daimon"
      version: 0.1.0
    status: active

  openclaw:
    remote: git@github.com:openclaw/openclaw.git
    ref: v2026.6.8
    default_branch: main
    install:
      kind: npm
      package: openclaw
      version: 2026.6.8
    status: active

  picoclaw:
    remote: git@github.com:sipeed/picoclaw.git
    ref: v0.2.9
    default_branch: main
    install:
      kind: github_release_archive
      repository: sipeed/picoclaw
      tag: v0.2.9
      binary: picoclaw
      assets:
        linux_amd64: picoclaw_Linux_x86_64.tar.gz
        linux_arm64: picoclaw_Linux_arm64.tar.gz
    status: active

  pi:
    remote: git@github.com:earendil-works/pi.git
    ref: v0.79.9
    default_branch: main
    install:
      kind: npm
      package: "@earendil-works/pi-coding-agent"
      version: 0.79.9
    status: active

  hermes-agent:
    remote: git@github.com:NousResearch/hermes-agent.git
    ref: v2026.6.5
    default_branch: main
    status: exploratory

  nullclaw:
    remote: git@github.com:nullclaw/nullclaw.git
    ref: v2026.5.29
    default_branch: main
    status: exploratory

  opencode:
    remote: git@github.com:anomalyco/opencode.git
    ref: v1.16.2
    default_branch: dev
    status: exploratory

  openfang:
    remote: git@github.com:RightNow-AI/openfang.git
    ref: v0.6.9
    default_branch: main
    status: exploratory

  zeroclaw:
    remote: git@github.com:zeroclaw-labs/zeroclaw.git
    ref: v0.7.5
    default_branch: master
    status: exploratory
